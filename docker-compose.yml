services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-ui
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    networks:
      - db-network

  server:
    build:
      context: .
      dockerfile: dev.server.Dockerfile
    container_name: stickian-server
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./server
        - action: rebuild
          path: go.mod
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      - MIGRATIONS_URL=file:///root/server/migrations
    depends_on:
      - postgres
    networks:
      - db-network

  web:
    build:
      context: .
      dockerfile: dev.web.Dockerfile
    container_name: stickian-web
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./web
          target: /app/web
        - action: sync
          path: ./public
          target: /app/public
        - action: sync
          path: ./index.html
          target: /app/index.html
        - action: rebuild
          path: package.json
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://server:8080
    depends_on:
      - server
    networks:
      - db-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  db-network:
    driver: bridge
